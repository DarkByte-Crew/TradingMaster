<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trading Bot Admin Login</title>
  <style>
    :root {
      --bg: #f5efe2;
      --card: #fffaf1;
      --ink: #1d2a33;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --line: #d6c7ad;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, #f7d7a8, transparent 35%),
        radial-gradient(circle at bottom right, #b6e3d4, transparent 30%),
        var(--bg);
      font-family: "Segoe UI", sans-serif;
      color: var(--ink);
    }
    .card {
      width: min(420px, calc(100% - 32px));
      padding: 28px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 18px 50px rgba(29, 42, 51, 0.12);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 20px; line-height: 1.5; }
    label { display: block; margin: 14px 0 6px; font-weight: 600; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 15px;
    }
    button {
      margin-top: 18px;
      width: 100%;
      padding: 12px 14px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dark); }
    .flash {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fdecec;
      color: var(--danger);
      border: 1px solid #f5c2c0;
    }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h1>Admin Panel</h1>
    <p>Deploy link open করলে এখান থেকেই bot control করতে পারবেন.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Login</button>
  </form>
</body>
</html>
