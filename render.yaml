services:
  - type: web
    name: trading-gemini-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -u bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHANNEL_USERNAME
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
